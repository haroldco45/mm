<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velocímetro - Vibras Positivas HM</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .gauge-container {
            border: 8px solid #ffcc00;
            padding: 40px;
            border-radius: 50%;
            width: 180px;
            height: 180px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 30px rgba(255, 204, 0, 0.4);
            margin: 20px 0;
        }
        #speed { font-size: 70px; font-weight: bold; margin: 0; transition: color 0.3s; }
        .unit { font-size: 20px; color: #888; text-transform: uppercase; }
        
        .controls { display: grid; gap: 15px; grid-template-columns: 1fr 1fr; }
        button {
            padding: 15px 25px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.95); }
        .btn-test { grid-column: span 2; background: #007bff; color: white; }
        .btn-accel { background: #28a745; color: white; }
        .btn-brake { background: #dc3545; color: white; }

        footer {
            margin-top: 40px;
            font-size: 13px;
            color: #666;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <h2 style="color: #ffcc00;">VIBRAS POSITIVAS HM</h2>
    <p>Simulador de Velocidad en Tiempo Real</p>
    
    <div class="gauge-container">
        <p id="speed">0</p>
        <span class="unit">km/h</span>
    </div>

    <div class="controls">
        <button class="btn-test" onclick="probarAudio()">🎵 PROBAR AUDIO MAURICIO</button>
        
        <button class="btn-accel" onclick="acelerar()">ACELERAR</button>
        <button class="btn-brake" onclick="frenar()">FRENAR</button>
    </div>

    <audio id="audioMauricio">
        <source src="Mauricio-al-tazon.m4a" type="audio/mp4">
        Tu navegador no soporta el formato de audio.
    </audio>

    <footer>
        App desarrollada por **Vibras Positivas HM** <br>
        Derechos de autor (3117700431)
    </footer>

    <script>
        let velocidad = 0;
        const speedDisplay = document.getElementById('speed');
        const audio = document.getElementById('audioMauricio');

        // Función para el botón de prueba directa
        function probarAudio() {
            if (audio.paused) {
                audio.play().catch(e => alert("Error: Haz clic en la pantalla primero para permitir el audio."));
            } else {
                audio.pause();
                audio.currentTime = 0;
            }
        }

        function acelerar() {
            if (velocidad < 140) {
                velocidad += 20;
                actualizarEstado();
            }
        }

        function frenar() {
            if (velocidad > 0) {
                velocidad -= 20;
                actualizarEstado();
            }
        }

        function actualizarEstado() {
            speedDisplay.innerText = velocidad;

            // Lógica automática: suena a más de 80 km/h
            if (velocidad >= 80) {
                audio.play();
                speedDisplay.style.color = "#ffcc00";
            } else {
                audio.pause();
                audio.currentTime = 0;
                speedDisplay.style.color = "white";
            }
        }
    </script>
</body>
</html>
