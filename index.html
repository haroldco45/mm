<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velocímetro - Vibras Positivas HM</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .gauge-container {
            text-align: center;
            border: 5px solid #ffcc00;
            padding: 40px;
            border-radius: 50%;
            width: 200px;
            height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-shadow: 0 0 20px #ffcc00;
        }
        #speed {
            font-size: 60px;
            font-weight: bold;
            margin: 0;
        }
        .unit { font-size: 20px; color: #aaa; }
        .controls { margin-top: 30px; }
        button {
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
            background: #ffcc00;
            border: none;
            border-radius: 5px;
            font-weight: bold;
        }
        footer {
            margin-top: 50px;
            font-size: 12px;
            color: #555;
        }
    </style>
</head>
<body>

    <h1>Simulador de Velocidad</h1>
    
    <div class="gauge-container">
        <p id="speed">0</p>
        <span class="unit">km/h</span>
    </div>

    <div class="controls">
        <button onclick="acelerar()">ACELERAR</button>
        <button onclick="frenar()" style="background:#555; color:white;">FRENAR</button>
    </div>

    <audio id="audioMauricio" src="Mauricio-al-tazon.m4a"></audio>

    <footer>
        App desarrollada por **Vibras Positivas HM** <br>
        Derechos de autor (3117700431)
    </footer>

    <script>
        let velocidad = 0;
        const speedDisplay = document.getElementById('speed');
        const audio = document.getElementById('audioMauricio');
        let audioSonando = false;

        function acelerar() {
            if (velocidad < 120) {
                velocidad += 10;
                actualizarPantalla();
            }
        }

        function frenar() {
            if (velocidad > 0) {
                velocidad -= 10;
                actualizarPantalla();
            }
        }

        function actualizarPantalla() {
            speedDisplay.innerText = velocidad;

            // Si la velocidad supera los 80 km/h, suena Mauricio
            if (velocidad >= 80 && !audioSonando) {
                audio.play();
                audioSonando = true;
                speedDisplay.style.color = "#ffcc00";
            } else if (velocidad < 80) {
                audio.pause();
                audio.currentTime = 0; // Reinicia el audio
                audioSonando = false;
                speedDisplay.style.color = "white";
            }
        }
    </script>
</body>
</html>
